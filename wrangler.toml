name = "gtm-hack-tender-discovery"
main = "worker/src/index.ts"
compatibility_date = "2026-06-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/agents/*"]

[observability]
enabled = true

[vars]
FIND_TENDER_BASE_URL = "https://www.find-tender.service.gov.uk/api/1.0/ocdsReleasePackages"
FIND_TENDER_LOOKBACK_DAYS = "120"
FIND_TENDER_PAGE_LIMIT = "100"
FIND_TENDER_MAX_PAGES = "2"
PROCUREMENT_API_TIMEOUT_MS = "8000"
EMBEDDING_BATCH_SIZE = "25"
WORKERS_AI_EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
TENDER_INTEL_LLM_MODEL = "@cf/meta/llama-3.1-8b-instruct"
PROZORRO_BASE_URL = "https://public-api.prozorro.gov.ua/api/2.5"
PROZORRO_FEED_PAGES = "8"
PROZORRO_FEED_LIMIT = "100"

[[d1_databases]]
binding = "DB"
database_name = "gtm-hack-tender-discovery"
database_id = "5dcd363b-5e67-4d51-b367-06cb31f24936"
migrations_dir = "migrations"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "TenderIntelAgent"
class_name = "TenderIntelAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TenderIntelAgent"]

# Custom Domains point the whole hostname at this Worker.
[[routes]]
pattern = "tendermatch.uk"
custom_domain = true
